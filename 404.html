<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CodeGalaxy</title>
    <script>
      // Single Page Apps on GitHub Pages — https://github.com/rafgraph/spa-github-pages
      // When GH Pages hits a missing path it serves this 404.html.
      // We encode the real URL into a query-string and redirect to index.html
      // so React Router can pick it up.
      //
      // segmentCount = number of path segments in the repo URL.
      //   0  -> user/org site   (username.github.io)
      //   1  -> project site    (username.github.io/repo-name)
      var segmentCount = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
